<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>研究方法 | Hermes Research</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0f0f23; color: #e0e0e0; }
        .hero { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 60px 20px; text-align: center; }
        .hero h1 { font-size: 2em; color: #fff; margin-bottom: 15px; }
        .content { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .step { background: #1a1a2e; border-radius: 12px; padding: 25px; margin-bottom: 20px; border-left: 4px solid #e94560; }
        .step .num { display: inline-block; background: #e94560; color: #fff; width: 30px; height: 30px; border-radius: 50%; text-align: center; line-height: 30px; font-weight: bold; margin-right: 10px; }
        .step h3 { color: #fff; display: inline; }
        .step p { color: #a0a0a0; margin-top: 10px; }
        .step ul { color: #a0a0a0; margin-top: 10px; padding-left: 20px; }
        .principle { background: #fff3cd; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .principle h4 { color: #856404; margin-bottom: 10px; }
        .footer { text-align: center; padding: 30px; color: #666; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>研究方法</h1>
        <p style="color:#a0a0a0;">从意图澄清到结论验证——每一步都可追溯</p>
    </div>
    <div class="content">
        <div class="step"><span class="num">1</span><h3>意图澄清</h3><p>明确客户真正需要回答的问题。不是"分析一下这个行业"，而是"这个行业值不值得进入？"</p></div>
        <div class="step"><span class="num">2</span><h3>问题树构建</h3><p>把核心问题拆解为可验证的子问题，每个子问题有明确的数据来源。</p></div>
        <div class="step"><span class="num">3</span><h3>多源交叉验证</h3><p>每个结论至少用2个独立数据源验证。不依赖单一来源。</p></div>
        <div class="step"><span class="num">4</span><h3>不确定性标注</h3><p>每个结论标注置信度。数据不足时明确说"需要进一步验证"。</p></div>
        <div class="step"><span class="num">5</span><h3>可执行建议</h3><p>分析终点不是"发现了什么"，而是"所以你应该怎么做"。</p></div>
        <div class="principle"><h4>核心原则</h4><p><strong>真实优先于完成：</strong>宁可说"我不知道"，也不编造数据。</p></div>
    </div>
    <div class="footer"><p>Hermes Research | <a href="../index.html" style="color:#e94560;">返回首页</a></p></div>
</body>
</html>
